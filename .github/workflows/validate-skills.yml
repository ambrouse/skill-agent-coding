name: Validate Skills

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Codex skills
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $skillDirs = Get-ChildItem ".codex/skills" -Directory
          if ($skillDirs.Count -eq 0) {
            throw "No Codex skill directories found."
          }

          foreach ($dir in $skillDirs) {
            $skillFile = Join-Path $dir.FullName "SKILL.md"
            if (!(Test-Path $skillFile)) {
              throw "Missing SKILL.md in $($dir.FullName)"
            }

            $lines = Get-Content -Encoding UTF8 $skillFile
            $frontmatterEnd = [array]::IndexOf($lines, "---", 1)
            if ($lines[0] -ne "---" -or $frontmatterEnd -lt 2) {
              throw "Invalid YAML frontmatter in $skillFile"
            }

            if (!(Select-String -Path $skillFile -Pattern "^name:\s*.+" -Quiet)) {
              throw "Missing name in $skillFile"
            }

            if (!(Select-String -Path $skillFile -Pattern "^description:\s*.+" -Quiet)) {
              throw "Missing description in $skillFile"
            }

            if (!(Select-String -Path $skillFile -Pattern "^user-invocable:\s*true\s*$" -Quiet)) {
              throw "Missing user-invocable true in $skillFile"
            }
          }

      - name: Validate GitHub skill mirrors
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $skillDirs = Get-ChildItem ".github/skills" -Directory
          if ($skillDirs.Count -eq 0) {
            throw "No GitHub skill directories found."
          }

          foreach ($dir in $skillDirs) {
            $skillFile = Join-Path $dir.FullName "SKILL.md"
            if (!(Test-Path $skillFile)) {
              throw "Missing SKILL.md in $($dir.FullName)"
            }

            $lines = Get-Content -Encoding UTF8 $skillFile
            $frontmatterEnd = [array]::IndexOf($lines, "---", 1)
            if ($lines[0] -ne "---" -or $frontmatterEnd -lt 2) {
              throw "Invalid YAML frontmatter in $skillFile"
            }

            if (!(Select-String -Path $skillFile -Pattern "^name:\s*.+" -Quiet)) {
              throw "Missing name in $skillFile"
            }

            if (!(Select-String -Path $skillFile -Pattern "^description:\s*.+" -Quiet)) {
              throw "Missing description in $skillFile"
            }

            if (!(Select-String -Path $skillFile -Pattern "^user-invocable:\s*true\s*$" -Quiet)) {
              throw "Missing user-invocable true in $skillFile"
            }
          }
